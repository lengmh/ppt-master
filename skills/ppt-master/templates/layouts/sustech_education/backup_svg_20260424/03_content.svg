<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <polygon points="-50,0 84,0 128,72 -6,72" fill="#01ABA8"/>
  <polygon points="-70,36 64,36 108,108 -26,108" fill="#E3660D"/>

  <line x1="72" y1="76" x2="959" y2="76" stroke="#CECECE" stroke-width="1"/>
  <image x="969" y="0" width="299" height="76" xlink:href="logo_primary.png" preserveAspectRatio="xMaxYMid meet"/>

  <text x="72" y="58" fill="#003F43" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="30" font-weight="700">
    {{PAGE_TITLE}}
  </text>
  <rect x="72" y="88" width="168" height="4" rx="2" fill="#E3660D"/>

  <line x1="430" y1="160" x2="430" y2="620" stroke="#D9E4E6" stroke-width="1" stroke-dasharray="4 10"/>

  <text x="92" y="160" fill="#E3660D" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5">
    TEACHING FOCUS
  </text>
  <line x1="92" y1="174" x2="332" y2="174" stroke="#D9D9D9" stroke-width="1"/>

  <text x="92" y="228" fill="#003F43" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700">
    教学重点
  </text>
  <text x="92" y="274" fill="#1D1C1C" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18">
    先给核心结论、定义或问题。
  </text>
  <text x="92" y="314" fill="#5C5C5C" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16">
    左侧适合摘要、关键点与推导线索。
  </text>
  <text x="92" y="354" fill="#5C5C5C" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16">
    右侧放图示、公式、流程或对比内容。
  </text>

  <rect x="462" y="170" width="706" height="414" rx="16" fill="none" stroke="#CED6DA" stroke-width="1.5" stroke-dasharray="8 10"/>
  <text x="815" y="388" text-anchor="middle" fill="#B8B8B8" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22">
    {{CONTENT_AREA}}
  </text>

  <text x="92" y="620" fill="#9D9D9D" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13">
    建议一页聚焦一个教学重点，避免把提纲与正文混排。
  </text>

  <line x1="72" y1="688" x2="1208" y2="688" stroke="#CECECE" stroke-width="1"/>
  <text x="76" y="706" fill="#9D9D9D" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" letter-spacing="1">
    SOUTHERN UNIVERSITY OF SCIENCE AND TECHNOLOGY
  </text>
  <text x="640" y="706" text-anchor="middle" fill="#5C5C5C" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12">
    {{SOURCE}}
  </text>
  <text x="1208" y="706" text-anchor="end" fill="#E3660D" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700">
    {{PAGE_NUM}}
  </text>
</svg>
